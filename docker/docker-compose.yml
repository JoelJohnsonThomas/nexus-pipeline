version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: newsaggregator-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - newsaggregator_db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: newsaggregator-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - newsaggregator_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: newsaggregator-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python scripts/run_workers.py
    volumes:
      - newsaggregator_logs:/app/logs

  pipeline:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: newsaggregator-pipeline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    command: python main.py --mode run
    volumes:
      - newsaggregator_logs:/app/logs

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: newsaggregator-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m uvicorn app.api.main:app --host 0.0.0.0 --port 8000

volumes:
  newsaggregator_db_data:
    driver: local
  newsaggregator_redis_data:
    driver: local
  newsaggregator_logs:
    driver: local
